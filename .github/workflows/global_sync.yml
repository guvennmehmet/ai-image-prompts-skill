name: Global Prompt Sync

on:
  push:
    paths:
      - 'references/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sync via Curl
        run: |
          curl -X POST https://syncpromptsfromgithubv2-42xwheqpsq-uc.a.run.app \
          -H "Content-Type: application/json" \
          -d '{"data": {}}'
