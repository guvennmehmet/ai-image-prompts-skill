name: Global Prompt Sync

on:
  push:
    paths:
      - 'references/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sync via Curl
        run: |
          curl -X POST https://us-central1-mio-app-94d38.cloudfunctions.net/syncPromptsFromGitHubV2 \
          -H "Content-Type: application/json" \
          -d '{"data": {}}'
